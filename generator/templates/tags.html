{% extends "base.html" %}

{% block title %}Tags &mdash; {{ site_title }}{% endblock %}

{% block content %}
<h1>Tags</h1>
<ul>
    {% for tag, pages in tags | dictsort %}
    <li>
        <a href="/tags/{{ tag }}/">{{ tag }}</a>
        ({{ pages | length }})
    </li>
    {% endfor %}
</ul>
{% endblock %}
